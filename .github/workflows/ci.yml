name: Python CI
on: [push]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install flake8 black
      - name: Check formatting with Black
        run: black --check .
      - name: Lint with Flake8
        run: flake8 .
